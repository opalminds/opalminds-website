<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Opalminds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/Only_Logo.png">
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .not-found-inner { max-width: 480px; }
    .not-found-code {
      font-family: var(--font-mono);
      font-size: 96px;
      font-weight: 500;
      background: linear-gradient(135deg, #0398F8, #0FDFE3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.04em;
    }
    .not-found-inner h1 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 600;
      color: var(--ice);
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }
    .not-found-inner p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 36px;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-inner">
      <div class="not-found-code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn-primary">Back to Opalminds</a>
    </div>
  </div>
</body>
</html>
